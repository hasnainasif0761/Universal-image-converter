<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal File Converter</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="mainUi.css">
    <link
        href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
        rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f0faf8] [font-family:'Poppins',sans-serif]">
    <div class="w-full h-[80px] pt-2  bg-white shadow-lg">
    <div class="navbar max-w-[1150px] mx-auto">
        <div class="logo">
            <img src="./logo.png">
            <span>File Converter</span>
        </div>
        <ul class="flex gap-12">
            <li class="font-semibold capitalize">How It Work</li>
            <li class="font-semibold">Support Formats</li>
            <li class="font-semibold">Pricing</li>
            <li class="font-semibold">My Account</li>
        </ul>
    </div>
    </div>
    <h1 class="text-center mt-7 text-3xl font-semibold">Convert Anything, in a Snap</h1>
    <div class="max-w-[1150px] grid-container mx-auto mt-6 gap-5">
        <div class="card-1 h-[390px] border flex flex-col pt-2">
            <p class="text-[14px] font-semibold text-center mb-2">SELECT CONVERSION TYPE</p>
            <div class="inner-card active w-[90%] h-[100px] border border-[3px] mx-auto rounded-[10px] mb-4 flex items-center gap-2 pl-2">
                <img src="./image-1-removebg-preview.png" class="w-[100px]">
                <div class="flex flex-col">
                    <span class="text-[16px] font-semibold">Image to Image</span>
                    <span class="text-[12px] font-[400]">JPG, PNG, WEBP, BMP...</span>
                </div>
            </div>
            <div class="inner-card w-[90%] h-[100px] border border-[3px] mx-auto rounded-[10px] mb-4 flex items-center gap-2 pl-2">
                <img src="./pdf-1-removebg-preview.png" class="w-[100px]">
                <div class="flex flex-col">
                    <span class="text-[16px] font-semibold">PDF to Image</span>
                    <span class="text-[12px] font-[400]">Convert </span>
                </div>
            </div>
            <div class="inner-card w-[90%] h-[100px] border border-[3px] mx-auto rounded-[10px] mb-4 flex items-center gap-2 pl-2">
                <img src="./imag-2-removebg-preview.png" class="w-[100px]">
                <div class="flex flex-col">
                    <span class="text-[16px] font-semibold">Image to PDF</span>
                    <span class="text-[12px] font-[400]">JPG, PNG, WEBP, BMP...</span>
                </div>
            </div>
        </div>
        <div class="card-1 h-[390px] border pt-5">
            <div class="w-[93%] h-[300px] border mx-auto">
                <div class="w-1/2 h-full border">

                </div>
                <div></div>
            </div>
        </div>
        <div class="card-1 h-[390px] border "></div>
    </div>
</body>
</html>
